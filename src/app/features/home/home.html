<div class="home">
  <section class="hero">
    <h1>{{ t().appName }}</h1>
    <p class="tagline">{{ t().tagline }}</p>
    <p class="lead">{{ t().heroLead }}</p>
  </section>

  <section class="search-card">
    <label class="lang-label">
      {{ t().wikiLabel }}
      <select [value]="lang()" (change)="onLangChange($event)">
        @for (e of editions; track e.code) {
          <option [value]="e.code">{{ e.label }} ({{ e.code }}.wikipedia.org)</option>
        }
      </select>
    </label>

    <div class="search-row">
      <input
        type="search"
        [value]="query()"
        (input)="onQuery($event)"
        (keydown.enter)="submit()"
        [placeholder]="t().searchPlaceholder"
        autocomplete="off"
        autofocus
      />
      <button class="go" (click)="submit()">{{ t().searchButton }}</button>
    </div>

    @if (suggestions().length) {
      <ul class="suggestions">
        @for (s of suggestions(); track s) {
          <li><button (click)="go(s)">{{ s }}</button></li>
        }
      </ul>
    }

    <p class="examples">
      {{ t().examplesLabel }}
      @for (ex of examples(); track ex) {
        <button class="chip" (click)="go(ex)">{{ ex }}</button>
      }
    </p>
  </section>

  <section class="how">
    <h2>{{ t().howTitle }}</h2>
    <ol>
      <li>{{ t().how1 }}</li>
      <li>{{ t().how2 }}</li>
      <li>{{ t().how3 }}</li>
    </ol>
  </section>
</div>
